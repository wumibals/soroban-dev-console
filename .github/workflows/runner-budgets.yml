name: Runner Resource Budgets

on:
  workflow_call:
  workflow_dispatch:

jobs:
  lint-budget:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: echo "Lint budget enforced: 10 min / ubuntu-latest"

  test-budget:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: echo "Test budget enforced: 20 min / ubuntu-latest"

  build-budget:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build budget enforced: 15 min / ubuntu-latest"

  e2e-budget:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: echo "E2E budget enforced: 30 min / ubuntu-latest"
