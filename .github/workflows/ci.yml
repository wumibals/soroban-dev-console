name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      packages: ${{ steps.filter.outputs.packages }}
      api: ${{ steps.filter.outputs.api }}
      contracts: ${{ steps.filter.outputs.contracts }}
      e2e: ${{ steps.filter.outputs.e2e }}
      devops: ${{ steps.filter.outputs.devops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/soroban-utils/**'
            packages:
              - 'packages/**'
            api:
              - 'apps/api/**'
              - 'packages/api-contracts/**'
            contracts:
              - 'contracts/**'
            e2e:
              - 'apps/web/e2e/**'
              - 'apps/web/playwright.config.ts'
            devops:
              - 'scripts/**'
              - 'packages/api-contracts/src/runtime-defaults.ts'
              - 'README.md'
              - 'docs/architecture.md'
              - 'apps/api/.env.example'
              - 'apps/web/.env.example'
              - 'package.json'
              - 'package-lock.json'
              - '**/package.json'

  security:
    name: Security Guardrails
    needs: changes
    if: needs.changes.outputs.devops == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run security:scan

      - name: Validate playbooks
        run: npm run security:playbooks

      - name: Dependency integrity
        run: npm run check-integrity

      - name: Dependency policy gate
        run: npx tsx scripts/check-dependency-policy.ts

      - name: Supply-chain verification
        run: |
          echo "## Supply-Chain Controls" >> $GITHUB_STEP_SUMMARY
          if [ -f "build-manifest.json" ]; then
            echo "✅ Build manifest found — supply-chain tracking active" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No build-manifest.json found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Supply-chain input verification complete."

      - name: Backup artifact protection
        run: |
          echo "## Backup & Restore Protection" >> $GITHUB_STEP_SUMMARY
          if [ -f "scripts/backup-restore-drill.sh" ]; then
            bash -n scripts/backup-restore-drill.sh && echo "✅ backup-restore-drill.sh syntax OK" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ".github/workflows/backup-restore-drill.yml" ]; then
            echo "✅ Backup restore workflow present" >> $GITHUB_STEP_SUMMARY
          fi

  web:
    name: Web
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-web-${{ hashFiles('apps/web/**', 'packages/ui/**', 'packages/soroban-utils/**', 'turbo.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-web-${{ hashFiles('turbo.json', 'package-lock.json') }}-
            ${{ runner.os }}-turbo-web-

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint -w web

      - name: Build web
        run: npm run build -w web -- --webpack

      - name: Typecheck web
        run: npm run typecheck -w web

      - name: Run unit tests
        run: npm run test:run -w web

      - name: Analyze bundle size
        run: npm run analyze -w web
        env:
          ANALYZE: 'true'

      - name: Check performance budgets
        run: npm run check-budget -w web

      - name: Upload bundle analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/web/.next/analyze/
          retention-days: 30

  packages:
    name: Package Validation (${{ matrix.workspace }})
    needs: changes
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ["@devconsole/ui", "@devconsole/soroban-utils"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-packages-${{ matrix.workspace }}-${{ hashFiles('packages/**', 'turbo.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-packages-${{ matrix.workspace }}-${{ hashFiles('turbo.json', 'package-lock.json') }}-
            ${{ runner.os }}-turbo-packages-${{ matrix.workspace }}-
            ${{ runner.os }}-turbo-packages-

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npx turbo run lint typecheck build --filter=${{ matrix.workspace }}

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-api-${{ hashFiles('apps/api/**', 'packages/api-contracts/**', 'turbo.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-api-${{ hashFiles('turbo.json', 'package-lock.json') }}-
            ${{ runner.os }}-turbo-api-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w api

      - name: Lint API
        run: npm run lint -w api

      - name: Build API
        run: npm run build -w api

      - name: Test API
        run: npm run test -w api

  contracts:
    name: Contracts (${{ matrix.contract }})
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        contract: ["auth-tester", "counter-fixture", "error-trigger", "event-fixture", "failure-fixture", "source-registry", "token-fixture", "types-tester"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/${{ matrix.contract }}

      - name: Test contract
        run: cargo test --manifest-path contracts/${{ matrix.contract }}/Cargo.toml

      - name: Build contract
        run: cargo build --release --manifest-path contracts/${{ matrix.contract }}/Cargo.toml

  e2e:
    name: E2E Tests
    needs: [changes, web]
    if: (needs.changes.outputs.e2e == 'true' || needs.changes.outputs.web == 'true') || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e -w web

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  devops:
    name: DevOps
    needs: changes
    if: needs.changes.outputs.devops == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-devops-${{ hashFiles('scripts/**', 'packages/api-contracts/src/runtime-defaults.ts', 'turbo.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-devops-${{ hashFiles('turbo.json', 'package-lock.json') }}-
            ${{ runner.os }}-turbo-devops-

      - name: Install dependencies
        run: npm ci

      - name: Check runtime drift
        id: drift
        run: npm run check-drift

      - name: Check dependency integrity
        id: integrity
        run: npm run check-integrity

      - name: Validate runbooks and observability docs
        id: runbooks
        run: |
          MISSING=()
          for f in docs/runbooks.md docs/observability.md; do
            [ -f "$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required docs: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ Runbooks and observability docs present"

      - name: Validate service health script
        id: health_script
        run: |
          if [ ! -f "scripts/check-service-health.sh" ]; then
            echo "❌ scripts/check-service-health.sh is missing"
            exit 1
          fi
          bash -n scripts/check-service-health.sh
          echo "✅ scripts/check-service-health.sh syntax OK"

      - name: Validate backup protection
        id: backup_protection
        run: |
          if [ -f "scripts/backup-restore-drill.sh" ]; then
            bash -n scripts/backup-restore-drill.sh
            echo "✅ backup-restore-drill.sh syntax OK" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ".github/workflows/backup-restore-drill.yml" ]; then
            echo "✅ Backup restore workflow present" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## DevOps Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.drift.outcome }}" = "success" ]; then
            echo "✅ **Runtime drift check**: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Runtime drift check**: failed — ports/URLs in docs or .env.example are out of sync with \`packages/api-contracts/src/runtime-defaults.ts\`. Run \`npm run check-drift\` locally to see details." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.integrity.outcome }}" = "success" ]; then
            echo "✅ **Dependency integrity check**: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Dependency integrity check**: failed — lockfile or workspace dependency versions are inconsistent. Run \`npm run check-integrity\` locally to see details." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.runbooks.outcome }}" = "success" ]; then
            echo "✅ **Runbooks / observability docs**: present" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Runbooks / observability docs**: missing — ensure docs/runbooks.md and docs/observability.md exist." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.health_script.outcome }}" = "success" ]; then
            echo "✅ **Service health script**: syntax OK" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Service health script**: missing or invalid — ensure scripts/check-service-health.sh exists and has valid bash syntax." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.backup_protection.outcome }}" = "success" ]; then
            echo "✅ **Backup protection**: validated" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Backup protection**: validation failed" >> $GITHUB_STEP_SUMMARY
          fi

  required-checks:
    name: Required Checks
    needs: [devops]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert devops gate passed
        run: |
          if [ "${{ needs.devops.result }}" != "success" ] && [ "${{ needs.devops.result }}" != "skipped" ]; then
            echo "❌ DevOps gate failed. Drift or integrity checks must pass before merge."
            exit 1
          fi
          echo "✅ All required checks passed."
  # DEVOPS-212: Wave-prep gate — runs the full release-readiness sequence.
  # For audit-ready artifacts (commit range, check logs, health notes), use the
  # Release Candidate workflow or: npm run release-evidence -- --wave <id>
  # See docs/release-evidence-bundle.md (DEVOPS-216).
  wave-prep:
    name: Wave Prep
    needs: [changes, devops]
    if: (needs.changes.outputs.devops == 'true' || github.event_name == 'push') && needs.devops.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-wave-prep-${{ hashFiles('scripts/**', 'packages/api-contracts/src/runtime-defaults.ts', 'turbo.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-wave-prep-${{ hashFiles('turbo.json', 'package-lock.json') }}-
            ${{ runner.os }}-turbo-wave-prep-

      - name: Install dependencies
        run: npm ci

      - name: Verify build order
        run: npx tsx scripts/verify-build-order.ts
        continue-on-error: true

      - name: Validate branch workflow
        run: npx tsx scripts/validate-branch-workflow.ts

      - name: Write wave-prep summary
        if: always()
        run: |
          echo "## Wave Prep Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All wave-prep checks completed. Review individual step results above." >> $GITHUB_STEP_SUMMARY

  # DEVOPS-201: Full-stack Wave integration gate.
  # Runs after all per-layer jobs and fails the PR if any layer regresses.
  wave-integration:
    name: Wave Integration Gate
    needs: [web, api, devops]
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Check layer results
        run: |
          results='${{ toJSON(needs) }}'
          echo "Layer results: $results"
          for job in web api devops; do
            result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('$job',{}).get('result','skipped'))")
            if [ "$result" = "failure" ]; then
              echo "::error::Layer '$job' failed — Wave integration gate blocked."
              exit 1
            fi
          done
          echo "All required layers passed or were skipped."

  # DEVOPS-201: Validate Prisma schema and migration consistency on API changes.
  api-schema:
    name: API Schema Validation
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w api

      - name: Validate Prisma schema
        run: npx prisma validate --schema apps/api/prisma/schema.prisma

      - name: Check migration consistency
        run: bash scripts/verify-migrations.sh
        continue-on-error: true

  # DEVOPS-201: Cross-boundary contract validation — api-contracts must build
  # cleanly whenever either the API or web layer changes.
  api-contracts:
    name: API Contracts
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and typecheck api-contracts
        run: npx turbo run build typecheck --filter=@devconsole/api-contracts
